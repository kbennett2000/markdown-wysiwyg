services:
  markdown-editor:
    build:
      context: .
      args:
        # Optional: bake in a Google OAuth Client ID for the online-only Drive feature.
        VITE_GDRIVE_CLIENT_ID: ${VITE_GDRIVE_CLIENT_ID:-}
    image: markdown-wysiwyg
    container_name: markdown-wysiwyg
    environment:
      # Port nginx listens on INSIDE the container.
      APP_PORT: ${APP_PORT:-8080}
    ports:
      # <host port>:<container port>. Change either via env vars below, e.g.
      #   APP_PORT=9000 HOST_PORT=9000 docker compose up --build
      - "${HOST_PORT:-8080}:${APP_PORT:-8080}"
    restart: unless-stopped
